{% extends "base.html" %}
{% block title %}Login — Dublin City{% endblock %}

{% block content %}

<div class="panel-card login-card">
  <h1>Sign In</h1>
  <p class="page-subtitle">Enter your dashboard credentials to continue.</p>

  {% if error %}
    <div class="alert alert-warning">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('auth.login_post') }}">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" id="username" name="username" type="text" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" id="password" name="password" type="password" required>
    </div>
    {% if next_url %}
      <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    <button class="btn-primary" type="submit">Login</button>
  </form>
</div>

{% endblock %}
